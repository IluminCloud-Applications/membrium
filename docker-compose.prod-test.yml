# ==============================================================
# Membrium — Docker Compose (Teste com Imagem de Produção)
# ==============================================================
# Usa a imagem real do GHCR (ghcr.io/iluminapp/membrium)
# para testar localmente como se fosse produção.
# docker compose -f docker-compose.prod-test.yml up --build
# ==============================================================

services:
  membrium:
    image: ghcr.io/iluminapp/membrium:latest
    ports:
      - "80:80"
    environment:
      - DATABASE_URL=postgresql://postgres:Extreme123@postgres:5432/membriumwl
      - FLASK_APP=app.py
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-super-secret-key-change-me}
    volumes:
      - uploads_data:/app/backend/static/uploads
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:14
    restart: always
    environment:
      POSTGRES_DB: membriumwl
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Extreme123
    ports:
      - "5432:5432"
    volumes:
      - membrium_data:/var/lib/postgresql/data

volumes:
  membrium_data:
  uploads_data:
