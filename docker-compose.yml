


services:
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:Extreme123@postgres:5432/membriumwl
      - FLASK_APP=app.py
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-super-secret-key-change-me}
    volumes:
      - backend_uploads:/app/static/uploads
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:14
    restart: always
    environment:
      POSTGRES_DB: membriumwl
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Extreme123
    ports:
      - "5432:5432"
    volumes:
      - membrium_data:/var/lib/postgresql/data

volumes:
  membrium_data:
  backend_uploads:
