# ==============================================================
# Membrium — Docker Compose (Imagem Unificada)
# ==============================================================
# Uma única imagem com Frontend (Nginx) + Backend (Gunicorn).
# O PostgreSQL continua como serviço separado.
# ==============================================================

services:
  membrium:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    environment:
      - DATABASE_URL=postgresql://postgres:Extreme123@postgres:5432/membriumwl
      - SECRET_KEY=${SECRET_KEY:-super-secret-key-change-me}
    volumes:
      - uploads_data:/app/backend/static/uploads
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:14
    restart: always
    environment:
      POSTGRES_DB: membriumwl
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Extreme123
    ports:
      - "5432:5432"
    volumes:
      - membrium_data:/var/lib/postgresql/data

volumes:
  membrium_data:
  uploads_data:
