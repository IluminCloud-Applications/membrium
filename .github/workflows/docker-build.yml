name: Build & Push Docker Image

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ilumincloud-applications/membrium

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete old package versions (keep only latest)
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE_NAME: membrium
          ORG_NAME: ilumincloud-applications
        run: |
          echo "Fetching all package versions..."
          VERSIONS=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/orgs/$ORG_NAME/packages/container/$PACKAGE_NAME/versions" \
            --paginate \
            -q '.[].id' 2>/dev/null || echo "")

          if [ -z "$VERSIONS" ]; then
            echo "No versions found or package does not exist yet. Skipping cleanup."
            exit 0
          fi

          # Count total versions
          TOTAL=$(echo "$VERSIONS" | wc -l)
          echo "Found $TOTAL version(s) total."

          if [ "$TOTAL" -le 1 ]; then
            echo "Only 1 version exists. Nothing to delete."
            exit 0
          fi

          # Keep the most recent (first in list), delete all others
          # This ensures that before the push, only the current "latest" exists
          # After the push, we will have 2: the new one and the one we just kept.
          VERSIONS_TO_DELETE=$(echo "$VERSIONS" | tail -n +2)
          COUNT=$(echo "$VERSIONS_TO_DELETE" | wc -l)
          echo "Deleting $COUNT old version(s)..."

          echo "$VERSIONS_TO_DELETE" | while read -r VERSION_ID; do
            echo "  Deleting version ID: $VERSION_ID"
            gh api \
              --method DELETE \
              -H "Accept: application/vnd.github+json" \
              "/orgs/$ORG_NAME/packages/container/$PACKAGE_NAME/versions/$VERSION_ID" \
              && echo "  ✓ Deleted $VERSION_ID" \
              || echo "  ✗ Failed to delete $VERSION_ID (may already be gone)"
          done

          echo "Cleanup complete. New image will be pushed, keeping the previous one as backup."

      - name: Generate timestamp tag
        id: timestamp
        run: echo "tag=$(date +'%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.timestamp.outputs.tag }},enable={{is_default_branch}}
            type=sha,prefix=,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
