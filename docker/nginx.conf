upstream gunicorn_backend {
    server 127.0.0.1:3000;
}

server {
    listen 80;
    server_name _;

    # Frontend static files
    root /app/frontend/dist;
    index index.html;

    # ---- Backend uploads — served directly by Nginx ----
    # This MUST come before the cache regex block so it takes priority
    location /static/uploads/ {
        alias /app/backend/static/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ---- YouTube Upload routes → Backend (longer timeouts) ----
    # Nginx buffers the file from the client (default), then passes to Python.
    # Python streams it to YouTube via resumable upload (fast server-to-server).
    location /api/youtube/upload {
        proxy_pass http://gunicorn_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        client_max_body_size 5G;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 10s;
    }

    # ---- API routes → Backend ----
    location /api/ {
        proxy_pass http://gunicorn_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;
        client_max_body_size 500M;
    }

    # ---- Webhook routes → Backend ----
    location /webhook/ {
        proxy_pass http://gunicorn_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Quick access link → Backend ----
    location /access/ {
        proxy_pass http://gunicorn_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Unsubscribe → Backend ----
    location /unsubscribe {
        proxy_pass http://gunicorn_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- SPA Fallback — all other routes → React ----
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- Cache frontend assets (JS, CSS, fonts) ----
    location ~* \.(js|css|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ---- Gzip compression ----
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;

    # ---- Default upload limit ----
    client_max_body_size 500M;
}
